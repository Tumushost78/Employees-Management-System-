  </div>

      </div>
    </div>
    <table class="profile-table">
  <tr>
    <th>Izina Banga</th>
    <td><input class="edit" type="text" id="emp-name"  placeholder="Izina Banga" required></td>
  </tr>
  <tr>
    <th>Ijambo banga</th>
    <td><input type="password" class="edit" id="emp-name2" placeholder="Ijambo banga" ></td>
  </tr>
  <tr>
    <th>Kwemeza Ijambo banga</th>
    <td><input type="password" class="edit" placeholder="Kwemeza Ijambo banga" id="emp-dob"></td>
  </tr>
</table>
